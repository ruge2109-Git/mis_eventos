<div class="max-w-4xl mx-auto space-y-8 pb-12 font-sans" *transloco="let t">
  <app-event-create-header
    [isEditMode]="isEditMode"
    [isLoading]="isLoading"
    (deleteClick)="openDeleteConfirm()" />

  <form #formStart [formGroup]="eventForm" (ngSubmit)="submit()" class="space-y-8">
    @if (globalError) {
      <div class="p-3 rounded-lg text-sm text-red-400 bg-red-500/10 border border-red-500/30" role="alert">
        {{ globalError }}
      </div>
    }

    <app-event-details-section [form]="eventForm" />

    <app-event-images-section
      [coverPreviewUrl]="eventImagePreview"
      [savedUrls]="savedAdditionalUrls"
      [newPreviewUrls]="additionalImagePreviews"
      [dragOver]="additionalImagesDragOver"
      (coverChange)="onImageChange($event)"
      (coverClear)="clearCoverImage()"
      (coverPreviewClick)="openPreview($event)"
      (additionalFilesAdd)="onAdditionalFilesAdd($event)"
      (additionalDrop)="onAdditionalDrop($event)"
      (dragOverChange)="setAdditionalImagesDragOver($event)"
      (removeNewAt)="removeAdditionalImage($event)"
      (removeSavedAt)="removeSavedAdditionalUrl($event)"
      (previewClick)="openPreview($event)" />

    <app-event-sessions-section
      [sessions]="sessions"
      [getSessionError]="sessionErrorFn"
      (addSession)="addSession()"
      (removeSession)="removeSession($event)" />

    <app-event-form-actions [isLoading]="isLoading" [isEditMode]="isEditMode" />
  </form>

  <app-confirm-modal [isOpen]="showDeleteConfirm" [title]="t('dashboard.deleteEventConfirmTitle')"
    [message]="t('dashboard.deleteEventConfirmMessage')" [confirmLabel]="t('dashboard.deleteConfirm')"
    [cancelLabel]="t('dashboard.cancel')" confirmVariant="danger" (confirm)="confirmDelete()"
    (cancelRequested)="closeDeleteConfirm()" />

  <app-image-preview-modal [imageUrl]="previewImageUrl" (close)="closePreview()" />
</div>
