<header class="flex items-center gap-3 sm:gap-4 flex-wrap" *transloco="let t">
  <a [routerLink]="['/dashboard/organizer']"
    class="flex items-center justify-center w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-slate-400 hover:text-white transition-colors shrink-0 cursor-pointer"
    aria-label="Volver">
    <span class="material-symbols-outlined">arrow_back</span>
  </a>
  <div class="flex-1 min-w-0">
    <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-tight">
      {{ isEditMode() ? t('dashboard.editEventTitle') : t('dashboard.createEventTitle') }}
    </h1>
    <p class="text-slate-400 text-sm mt-0.5">
      {{ isEditMode() ? t('dashboard.editEventSubtitle') : t('dashboard.createEventSubtitle') }}
    </p>
  </div>
  @if (isEditMode()) {
    <app-button type="button" variant="ghost" [disabled]="isLoading()"
      customClass="border border-red-500/50 text-red-400 hover:bg-red-500/10 hover:text-red-300"
      (clicked)="deleteClick.emit()">
      <span class="material-symbols-outlined text-lg">delete</span>
      {{ t('dashboard.deleteEvent') }}
    </app-button>
  }
</header>
