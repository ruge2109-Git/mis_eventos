@if (isOpen()) {
  <div class="confirm-modal-overlay fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/70"
       (click)="onOverlayClick()" (keydown.escape)="onOverlayClick()" tabindex="0"
       role="dialog"
       aria-modal="true"
       [attr.aria-labelledby]="'confirm-modal-title'"
       [attr.aria-describedby]="'confirm-modal-desc'">
    <div class="confirm-modal-content rounded-2xl border border-white/10 bg-surface shadow-xl max-w-md w-full p-6"
         (click)="$event.stopPropagation()" (keydown.escape)="$event.stopPropagation()" tabindex="0">
      <h2 id="confirm-modal-title" class="text-lg font-bold text-white mb-2">{{ title() }}</h2>
      <p id="confirm-modal-desc" class="text-slate-400 text-sm mb-6">{{ message() }}</p>
      <div class="flex flex-col-reverse sm:flex-row gap-3 sm:justify-end">
        <app-button type="button" variant="ghost" (clicked)="onCancel()"
                    customClass="text-slate-300 hover:text-white">
          {{ cancelLabel() }}
        </app-button>
        @if (confirmVariant() === 'danger') {
          <button type="button"
                  class="rounded-xl font-bold transition-all px-6 py-2.5 text-sm bg-red-500 hover:bg-red-600 text-white disabled:opacity-50 cursor-pointer"
                  (click)="onConfirm()">
            {{ confirmLabel() }}
          </button>
        } @else {
          <app-button type="button" (clicked)="onConfirm()">
            {{ confirmLabel() }}
          </app-button>
        }
      </div>
    </div>
  </div>
}
