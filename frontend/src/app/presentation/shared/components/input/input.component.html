<div class="flex flex-col gap-2 w-full">
  @if (label()) {
  <label [for]="id()" class="text-sm font-medium text-slate-300 ml-1">
    {{ label() }}
  </label>
  }
  <div class="relative group w-full">
    @if (icon()) {
    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
      <span class="material-symbols-outlined text-slate-500 group-focus-within:text-accent-cyan transition-colors">
        {{ icon() }}
      </span>
    </div>
    }
    <input [id]="id()" [type]="type()" [placeholder]="placeholder()" [formControl]="control()"
      [class]="'w-full bg-surface border border-white/10 rounded-xl py-3 px-4 focus:ring-2 focus:ring-accent-cyan/50 focus:border-accent-cyan/50 transition-all outline-none text-slate-100 placeholder-slate-500 font-space ' + customClass()"
      [class.pl-12]="icon() && !customClass().includes('pl-')"
      [class.border-red-500]="control().invalid && control().touched" />
  </div>
  @if (control().invalid && control().touched) {
  <span class="text-xs text-red-500 ml-1">Campo inválido</span>
  }
</div>
